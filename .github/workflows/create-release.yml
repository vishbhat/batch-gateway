# Release workflow: creates a GitHub Release on version tags (v*.*.*),
# builds multi-arch binaries (as .tar.gz to preserve execute bit), and publishes release notes.
# Docker images for the same tag are built by ci-release.yaml.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  verify-tag-on-allowed-branch:
    name: Verify tag is on main or a release branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is reachable from main or release-*
        run: |
          git fetch origin
          TAG_SHA="${GITHUB_SHA}"
          if git merge-base --is-ancestor "$TAG_SHA" "origin/main" 2>/dev/null; then
            echo "Tag is reachable from origin/main."
            exit 0
          fi
          ok=0
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            if git merge-base --is-ancestor "$TAG_SHA" "$ref" 2>/dev/null; then
              echo "Tag is reachable from ${ref}."
              ok=1
              break
            fi
          done < <(git branch -r | sed 's/^[ *]*//' | grep -E '^origin/release-' || true)
          if [ "$ok" -ne 1 ]; then
            echo "::error::Release tags must point to a commit on main or on an origin/release-* branch."
            exit 1
          fi

  build:
    name: Build binaries
    needs: verify-tag-on-allowed-branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release binaries (linux/amd64)
        run: GOOS=linux GOARCH=amd64 make build-release
      - name: Build release binaries (linux/arm64)
        run: GOOS=linux GOARCH=arm64 make build-release

      - name: Upload release binaries
        uses: actions/upload-artifact@v7
        with:
          name: release-binaries
          path: bin/batch-gateway-*

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release binaries
        uses: actions/download-artifact@v8
        with:
          name: release-binaries
          path: dist/binaries

      - name: Package binaries as tar.gz (preserves execute bit on extract)
        run: make package-release

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: '3.16.4'

      - name: Install yq
        uses: frenck/action-setup-yq@v1.0.2
        with:
          version: v4.52.4

      - name: Package and publish Helm chart
        env:
          VERSION: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: make publish-helm-chart

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          draft: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
